    <text x="92" y="240" fill="#E5E7EB" font-family="Consolas, monospace" font-size="11">document.querySelector(</text>
    <text x="256" y="240" fill="#C084FC" font-family="Consolas, monospace" font-size="11">"html"</text>
    <text x="290" y="240" fill="#E5E7EB" font-family="Consolas, monospace" font-size="11">).classList.add(themeMode)</text>

    <text x="74" y="264" fill="#667085" font-family="Consolas, monospace" font-size="11">5</text>
    <text x="92" y="264" fill="#E5E7EB" font-family="Consolas, monospace" font-size="11">return (</text>
    <text x="146" y="264" fill="#60A5FA" font-family="Consolas, monospace" font-size="11">&lt;ThemeProvider value={"{"} themeMode {"}"}&gt;</text>

