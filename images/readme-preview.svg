<svg width="100%" height="100%" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="previewTitle previewDesc" preserveAspectRatio="xMidYMid meet">
  <title id="previewTitle">Mobile Preview Simulator overview banner</title>
  <desc id="previewDesc">A dark banner showing a VS Code editor on the left and an iPhone preview on the right.</desc>
  <defs>
