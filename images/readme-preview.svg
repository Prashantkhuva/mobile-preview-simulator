    <text x="92" y="216" fill="#7DD3FC" font-family="Consolas, monospace" font-size="11">useEffect</text>
    <text x="156" y="216" fill="#E5E7EB" font-family="Consolas, monospace" font-size="11">(() =&gt; {"}"</text>

