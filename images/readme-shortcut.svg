<svg width="100%" height="100%" viewBox="0 0 600 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="shortcutTitle shortcutDesc" preserveAspectRatio="xMidYMid meet">
  <title id="shortcutTitle">Open Preview shortcut banner</title>
  <desc id="shortcutDesc">A small banner showing a VS Code title bar with an arrow pointing to the Open Preview button.</desc>
  <defs>
    <linearGradient id="shortcutBg" x1="0" y1="0" x2="600" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#202020"/>
      <stop offset="1" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="shortcutAccent" x1="376" y1="28" x2="535" y2="84" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shortcutShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="4" y="4" width="592" height="112" rx="12" fill="url(#shortcutBg)"/>
  <rect x="4" y="4" width="592" height="112" rx="12" stroke="#2B3140"/>

  <text x="26" y="28" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Click to open mobile preview</text>

